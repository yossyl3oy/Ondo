name: CI

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - '*.md'
      - 'LICENSE'
      - 'docs/**'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check (tsc)
        run: pnpm exec tsc --noEmit

      - name: npm audit
        run: pnpm audit --prod

      - name: Build frontend
        run: pnpm build

  cargo-check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Read tool versions
        id: tools
        shell: bash
        run: |
          RUST=$(sed -n 's/^rust = "\(.*\)"/\1/p' .mise.toml)
          echo "rust=$RUST" >> $GITHUB_OUTPUT

      - name: Install Rust ${{ steps.tools.outputs.rust }}
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ steps.tools.outputs.rust }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Cargo check
        run: cargo check
        working-directory: src-tauri

      - name: Cache cargo-audit binary
        uses: actions/cache@v6
        with:
          path: ~/.cargo/bin/cargo-audit
          key: cargo-audit-${{ runner.os }}

      - name: Install cargo-audit
        run: cargo install cargo-audit
        working-directory: src-tauri

      - name: Cargo audit
        run: cargo audit
        working-directory: src-tauri

  lhm-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Read tool versions
        id: tools
        shell: bash
        run: |
          DOTNET=$(sed -n 's/^dotnet = "\(.*\)"/\1/p' .mise.toml)
          if [[ "$DOTNET" =~ ^[0-9]+\.[0-9]+$ ]]; then
            DOTNET_SETUP="${DOTNET}.x"
          else
            DOTNET_SETUP="$DOTNET"
          fi
          echo "dotnet=$DOTNET" >> $GITHUB_OUTPUT
          echo "dotnet_setup=$DOTNET_SETUP" >> $GITHUB_OUTPUT

      - name: Setup .NET ${{ steps.tools.outputs.dotnet }}
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ steps.tools.outputs.dotnet_setup }}

      - name: Build LHM CLI
        shell: pwsh
        working-directory: src-lhm
        run: |
          dotnet --version
          dotnet publish OndoHardwareMonitor.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o publish
          if (-not (Test-Path "publish/ondo-hwmon.exe")) {
            Write-Error "ondo-hwmon.exe not produced"
            exit 1
          }
          Get-Item publish/ondo-hwmon.exe | Select-Object Name, Length
