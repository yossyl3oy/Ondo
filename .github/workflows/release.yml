name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild even if release exists'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.id || steps.get-existing-release.outputs.id }}
      version: ${{ steps.get-version.outputs.version }}
      is_rebuild: ${{ steps.check-release.outputs.exists }}
      skip: ${{ steps.check-version.outputs.skip }}
    steps:
      - uses: actions/checkout@v6

      - name: Get version from package.json
        id: get-version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Check if release exists and is complete
        id: check-release
        run: |
          CURRENT="v${{ steps.get-version.outputs.version }}"
          if gh release view "$CURRENT" > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            # Check if release has all expected assets (Windows .exe, macOS .dmg files)
            ASSETS=$(gh release view "$CURRENT" --json assets -q '.assets[].name' 2>/dev/null || echo "")
            if echo "$ASSETS" | grep -q "setup\.exe" && echo "$ASSETS" | grep -q "\.dmg"; then
              echo "complete=true" >> $GITHUB_OUTPUT
              echo "Release $CURRENT is complete with all assets"
            else
              echo "complete=false" >> $GITHUB_OUTPUT
              echo "Release $CURRENT exists but is incomplete (missing assets)"
            fi
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "complete=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine if build should be skipped
        id: check-version
        run: |
          CURRENT="v${{ steps.get-version.outputs.version }}"
          FORCE="${{ github.event.inputs.force_rebuild }}"
          EXISTS="${{ steps.check-release.outputs.exists }}"
          COMPLETE="${{ steps.check-release.outputs.complete }}"
          # Skip only if release exists AND is complete AND not force rebuild
          if [ "$EXISTS" = "true" ] && [ "$COMPLETE" = "true" ] && [ "$FORCE" != "true" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Release $CURRENT is complete, skipping build"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Will build: exists=$EXISTS complete=$COMPLETE force=$FORCE"
          fi

      - name: Get existing release ID for rebuild
        id: get-existing-release
        if: steps.check-version.outputs.skip == 'false' && steps.check-release.outputs.exists == 'true'
        run: |
          RELEASE_ID=$(gh release view "v${{ steps.get-version.outputs.version }}" --json id -q '.id' 2>/dev/null || echo "")
          # GitHub CLI returns database ID, we need to get the release ID from API
          RELEASE_DATA=$(gh api repos/${{ github.repository }}/releases/tags/v${{ steps.get-version.outputs.version }})
          RELEASE_ID=$(echo "$RELEASE_DATA" | jq -r '.id')
          echo "id=$RELEASE_ID" >> $GITHUB_OUTPUT
          echo "Rebuilding release with ID: $RELEASE_ID"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate changelog
        id: changelog
        if: steps.check-version.outputs.skip == 'false' && steps.check-release.outputs.exists != 'true'
        run: |
          # Find the previous release tag and fetch it
          PREV_TAG=$(gh release list --limit 1 --json tagName -q '.[0].tagName' 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            git fetch origin "refs/tags/${PREV_TAG}:refs/tags/${PREV_TAG}" 2>/dev/null || PREV_TAG=""
          fi
          if [ -z "$PREV_TAG" ] || ! git rev-parse "${PREV_TAG}" > /dev/null 2>&1; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges -20)
          else
            COMMITS=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges)
          fi
          {
            echo "commits<<EOF"
            echo "$COMMITS"
            echo "EOF"
          } >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        id: create-release
        if: steps.check-version.outputs.skip == 'false' && steps.check-release.outputs.exists != 'true'
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.get-version.outputs.version }}
          release_name: Ondo v${{ steps.get-version.outputs.version }}
          body: |
            ## Ondo v${{ steps.get-version.outputs.version }}

            A sleek, HUD-style hardware temperature monitoring widget.

            ### Downloads
            - **Windows**: Download the `.msi` or `.exe` installer
            - **macOS**: Download the `.dmg` file

            ### Changes
            ${{ steps.changelog.outputs.commits }}
          draft: false
          prerelease: false

  build-tauri:
    needs: create-release
    # Build if: not skipped AND (new release created, force rebuild requested, or release is incomplete)
    if: needs.create-release.outputs.skip != 'true' && needs.create-release.outputs.release_id != ''
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: '--bundles nsis'
            rust_targets: ''
          - platform: macos-14
            args: '--target aarch64-apple-darwin'
            rust_targets: 'aarch64-apple-darwin'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '25.2.1'

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Setup .NET (Windows)
        if: matrix.platform == 'windows-latest'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Build LHM CLI (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          cd src-lhm
          dotnet --version
          dotnet publish OndoHardwareMonitor.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o publish
          Write-Host "=== Build output ==="
          Get-ChildItem -Recurse -Filter "ondo-hwmon.exe" | ForEach-Object { Write-Host $_.FullName }
          Copy-Item publish/ondo-hwmon.exe ../src-tauri/

      - name: Download PawnIO installer (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $pawnioUrl = "https://github.com/namazso/PawnIO.Setup/releases/latest/download/PawnIO_setup.exe"
          $pawnioPath = "src-tauri/PawnIO_setup.exe"
          Write-Host "Downloading PawnIO installer..."
          Invoke-WebRequest -Uri $pawnioUrl -OutFile $pawnioPath -UseBasicParsing
          Write-Host "PawnIO installer downloaded to $pawnioPath"
          Get-Item $pawnioPath | Select-Object Name, Length

      - name: Configure resources for Windows
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const config = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json'));
            config.bundle.resources = ['ondo-hwmon.exe', 'PawnIO_setup.exe'];
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(config, null, 2));
          "

      - name: Cache NSIS (Windows)
        if: matrix.platform == 'windows-latest'
        id: cache-nsis
        uses: actions/cache@v5
        with:
          path: ~/.tauri/NSIS
          key: nsis-3.11
          restore-keys: |
            nsis-

      - name: Download NSIS with retry (Windows)
        if: matrix.platform == 'windows-latest' && steps.cache-nsis.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $maxRetries = 5
          $retryDelay = 30
          $nsisUrl = "https://github.com/tauri-apps/binary-releases/releases/download/nsis-3.11/nsis-3.11.zip"
          $nsisDir = "$env:USERPROFILE\.tauri\NSIS"
          $nsisZip = "$env:TEMP\nsis-3.11.zip"

          New-Item -ItemType Directory -Force -Path $nsisDir | Out-Null

          for ($i = 1; $i -le $maxRetries; $i++) {
            try {
              Write-Host "Attempt $i of $maxRetries to download NSIS..."
              Invoke-WebRequest -Uri $nsisUrl -OutFile $nsisZip -UseBasicParsing
              Write-Host "Download successful!"
              Expand-Archive -Path $nsisZip -DestinationPath $nsisDir -Force
              Remove-Item $nsisZip
              exit 0
            } catch {
              Write-Host "Download failed: $_"
              if ($i -lt $maxRetries) {
                Write-Host "Waiting $retryDelay seconds before retry..."
                Start-Sleep -Seconds $retryDelay
              }
            }
          }
          Write-Error "Failed to download NSIS after $maxRetries attempts"
          exit 1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}
          includeUpdaterJson: true
          updaterJsonKeepUniversal: true

  cleanup-old-releases:
    needs: [create-release, build-tauri]
    if: always() && needs.create-release.result == 'success' && needs.create-release.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Delete old releases (keep latest 3)
        run: |
          echo "Fetching all releases..."
          RELEASES=$(gh api repos/${{ github.repository }}/releases --paginate --jq '.[].tag_name')
          COUNT=0
          for TAG in $RELEASES; do
            COUNT=$((COUNT + 1))
            if [ $COUNT -gt 3 ]; then
              echo "Deleting release: $TAG"
              gh release delete "$TAG" --repo ${{ github.repository }} --yes --cleanup-tag
            else
              echo "Keeping release: $TAG"
            fi
          done
          echo "Cleanup complete. Kept latest 3 releases."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
